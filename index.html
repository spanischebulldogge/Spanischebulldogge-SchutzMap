<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SpanischeBulldogge – Einsatzkarte Deutschland</title>

    <!-- Schrift -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Leaflet -->
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <!-- Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">

    <div class="logo">

        <img src="assets/logo.png.png
        " alt="Logo">

        <div>

            <h1>SpanischeBulldogge</h1>

            <span>Einsatzkarte Deutschland</span>

        </div>

    </div>

    <div class="search">

        <i class="fa-solid fa-magnifying-glass"></i>

        <input
                id="search"
                type="text"
                placeholder="Ort suchen...">

    </div>

</header>

<section class="dashboard">

    <div class="card">

        <h2 id="caseCount">0</h2>

        <span>Dokumentierte Fälle</span>

    </div>

    <div class="card">

        <h2 id="cityCount">0</h2>

        <span>Städte</span>

    </div>

    <div class="card">

        <h2 id="stateCount">0</h2>

        <span>Bundesländer</span>

    </div>

    <div class="card">

        <h2>Seit 2026</h2>

        <span>Aktiv</span>

    </div>

</section>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="script.js"></script>

</body>
</html>
